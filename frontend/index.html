<!DOCTYPE html>
<html lang="en">
<head>
<title>AI Study Agent</title>
<script src="auth0.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #06080f;
    --surface: #0d1117;
    --surface2: #161b26;
    --border: rgba(255,255,255,0.06);
    --border-glow: rgba(99,215,168,0.25);
    --accent: #63d7a8;
    --accent2: #4fc8f8;
    --accent-dim: rgba(99,215,168,0.12);
    --text: #e8edf5;
    --text-muted: #5a6478;
    --text-sub: #8b95a8;
    --user-bg: linear-gradient(135deg, #63d7a8, #4fc8f8);
    --bot-bg: #0d1117;
    --radius: 16px;
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    overflow: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(99,215,168,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(79,200,248,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(13,17,23,0.9) 0%, transparent 100%);
    pointer-events: none;
  }

  /* Subtle grid texture */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── Layout ── */
  .shell {
    position: relative; z-index: 1;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 0 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--user-bg);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(99,215,168,0.3);
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #e8edf5, #8b95a8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-badge {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(99,215,168,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 4px;
  }

  /* ── Top bar ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-sub);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 30px;
  }

  .user-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
    transform: translateY(-1px);
  }

  .btn-primary {
    background: var(--accent-dim);
    border-color: rgba(99,215,168,0.3);
    color: var(--accent);
  }

  .btn-primary:hover {
    background: rgba(99,215,168,0.18);
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(99,215,168,0.15);
  }

  /* ── Chat box ── */
  .chat-box {
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-track { background: transparent; }
  .chat-box::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  /* ── Messages ── */
  .message {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.bot-av {
    background: linear-gradient(135deg, #63d7a8, #4fc8f8);
    box-shadow: 0 0 14px rgba(99,215,168,0.25);
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }

  .bubble {
    max-width: 70%;
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 14px;
    font-weight: 300;
  }

  .message.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 4px;
  }

  .message.user .bubble {
    background: var(--user-bg);
    color: #06080f;
    font-weight: 400;
    border-top-right-radius: 4px;
    box-shadow: 0 4px 24px rgba(99,215,168,0.2);
  }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 18px;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease infinite;
    opacity: 0.5;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 0 24px;
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 6px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--border-glow);
    box-shadow: 0 0 0 3px rgba(99,215,168,0.06), 0 0 20px rgba(99,215,168,0.08);
  }

  .input-wrap input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 300;
    caret-color: var(--accent);
  }

  .input-wrap input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--user-bg);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s ease;
    box-shadow: 0 2px 12px rgba(99,215,168,0.25);
    flex-shrink: 0;
  }

  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 20px rgba(99,215,168,0.4);
  }

  .send-btn:active { transform: scale(0.96); }

  /* hint text */
  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* ── Divider label ── */
  .day-label {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: relative;
  }

  .day-label::before, .day-label::after {
    content: '';
    position: absolute;
    top: 50%; width: 30%;
    height: 1px;
    background: var(--border);
  }

  .day-label::before { left: 0; }
  .day-label::after { right: 0; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    padding: 40px 0;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 6px;
    filter: grayscale(0.3);
  }

  .empty-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text-sub);
    font-weight: 400;
  }

  .empty-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .suggestion-chip {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 300;
  }

  .suggestion-chip:hover {
    border-color: rgba(99,215,168,0.3);
    color: var(--accent);
    background: var(--accent-dim);
  }
</style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Study Agent</span>
      <span class="logo-badge">AI</span>
    </div>
  </header>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="user-pill">
      <div class="user-dot"></div>
      <span id="user">Not signed in</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="loginBtn">Sign in</button>
      <button class="btn" id="logoutBtn" style="display:none">Sign out</button>
      <button class="btn" onclick="clearChat()">Clear</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chatBox" class="chat-box">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📚</div>
      <div class="empty-title">What would you like to learn?</div>
      <div class="empty-sub">Ask me anything — from algorithms to quantum physics.</div>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="fillInput('Explain Laplace Transform')">Laplace Transform</div>
        <div class="suggestion-chip" onclick="fillInput('What is an Operating System?')">Operating Systems</div>
        <div class="suggestion-chip" onclick="fillInput('Explain Fourier Series')">Fourier Series</div>
        <div class="suggestion-chip" onclick="fillInput('What is Machine Learning?')">Machine Learning</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <input id="msg" placeholder="Ask anything…" autocomplete="off" />
      <button class="send-btn" id="sendBtn">↑</button>
    </div>
    <div class="hint">Press Enter to send · Powered by Mistral AI</div>
  </div>

</div>

<script src="script.js"></script>
<script>
  // Override addMessage to use new premium UI
  const _origAdd = window.addMessage;
  function addMessage(text, type) {
    const emptyState = document.getElementById("emptyState");
    if (emptyState) emptyState.remove();

    const chatBox = document.getElementById("chatBox");
    const wrap = document.createElement("div");
    wrap.classList.add("message", type);

    const avatar = document.createElement("div");
    avatar.classList.add("avatar", type === "bot" ? "bot-av" : "user-av");
    avatar.textContent = type === "bot" ? "✦" : "👤";

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatBox.appendChild(wrap);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Override typeEffect for premium version
  function typeEffect(text, type) {
    const emptyState = document.getElementById("emptyState");
    if (emptyState) emptyState.remove();

    const chatBox = document.getElementById("chatBox");
    const wrap = document.createElement("div");
    wrap.classList.add("message", type);

    const avatar = document.createElement("div");
    avatar.classList.add("avatar", type === "bot" ? "bot-av" : "user-av");
    avatar.textContent = type === "bot" ? "✦" : "👤";

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatBox.appendChild(wrap);

    let i = 0;
    function typing() {
      if (i < text.length) {
        bubble.textContent += text.charAt(i);
        i++;
        chatBox.scrollTop = chatBox.scrollHeight;
        setTimeout(typing, 12);
      }
    }
    typing();
  }

  // Loading message override using dots
  const _origSend = sendMessage;
  async function sendMessagePremium() {
    const input = document.getElementById("msg");
    const msg = input.value.trim();
    if (!msg) return;

    // Remove empty state
    const emptyState = document.getElementById("emptyState");
    if (emptyState) emptyState.remove();

    addMessage(msg, "user");
    input.value = "";

    // Premium typing indicator
    const chatBox = document.getElementById("chatBox");
    const loadWrap = document.createElement("div");
    loadWrap.classList.add("message", "bot");
    loadWrap.id = "loadingMsg";

    const loadAv = document.createElement("div");
    loadAv.classList.add("avatar", "bot-av");
    loadAv.textContent = "✦";

    const loadBubble = document.createElement("div");
    loadBubble.classList.add("bubble");
    loadBubble.style.padding = "0";
    loadBubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    loadWrap.appendChild(loadAv);
    loadWrap.appendChild(loadBubble);
    chatBox.appendChild(loadWrap);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const isAuthenticated = await auth0Client.isAuthenticated();
      if (!isAuthenticated) {
        document.getElementById("loadingMsg")?.remove();
        addMessage("Please sign in to start chatting.", "bot");
        return;
      }

      const token = await auth0Client.getTokenSilently();
      const res = await fetch("http://127.0.0.1:3000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ message: msg })
      });

      const data = await res.json();
      document.getElementById("loadingMsg")?.remove();
      typeEffect(data.reply, "bot");

    } catch (err) {
      document.getElementById("loadingMsg")?.remove();
      addMessage("Connection error. Please try again.", "bot");
    }
  }

  function fillInput(text) {
    document.getElementById("msg").value = text;
    document.getElementById("msg").focus();
  }

  // Hook up send button and Enter key to premium version
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("sendBtn").onclick = sendMessagePremium;
    document.getElementById("msg").addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessagePremium();
    });
  });
</script>

</body>
</html>
