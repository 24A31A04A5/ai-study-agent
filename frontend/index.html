<!DOCTYPE html>
<html>
<head>
<title>AI Study Agent</title>

<script src="auth0.js"></script>

<style>
body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: #0f172a;
color: white;
}

.header {
background: #1e293b;
padding: 15px;
text-align: center;
font-size: 20px;
font-weight: bold;
border-bottom: 1px solid #334155;
}

.container {
display: flex;
flex-direction: column;
height: 90vh;
max-width: 700px;
margin: auto;
}

.top-bar {
display: flex;
justify-content: space-between;
padding: 10px;
font-size: 14px;
color: #94a3b8;
}

.chat-box {
flex: 1;
overflow-y: auto;
padding: 15px;
display: flex;
flex-direction: column;
gap: 10px;
}

.message {
padding: 12px;
border-radius: 10px;
max-width: 75%;
line-height: 1.5;
}

.user {
background: #22c55e;
align-self: flex-end;
color: black;
}

.bot {
background: #1e293b;
align-self: flex-start;
border: 1px solid #334155;
}

.input-area {
display: flex;
padding: 10px;
border-top: 1px solid #334155;
background: #020617;
}

input {
flex: 1;
padding: 12px;
border-radius: 8px;
border: none;
outline: none;
background: #1e293b;
color: white;
}

button {
margin-left: 10px;
padding: 10px 16px;
border: none;
border-radius: 8px;
background: #22c55e;
color: black;
cursor: pointer;
font-weight: bold;
}

button:hover {
opacity: 0.9;
}

</style>

</head>

<body>

<div class="header">🚀 AI Study Agent</div>

<div class="container">

<div class="top-bar">
<span id="user">Not logged in</span>
<div>
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
</div>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
<input id="msg" placeholder="Ask anything..." />
<button id="sendBtn">Send</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
